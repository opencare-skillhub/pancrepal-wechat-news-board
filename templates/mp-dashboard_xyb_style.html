<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=1200" name="viewport"/>
<title>__TITLE__</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root{
    --xyb-bg:#f0f4f8;
    --xyb-paper:#fffdf9;
    --xyb-card:#ffffff;
    --xyb-blue:#4a6580;
    --xyb-blue-2:#7a9bb5;
    --xyb-blue-3:#aab9c3;
    --xyb-soft:#e8f0f5;
    --xyb-line:#d8e3eb;
    --xyb-text:#3e3e3e;
    --xyb-muted:#8d949f;
    --xyb-orange:#e9893a;
    --xyb-green:#4f9b78;
    --xyb-shadow:0 8px 28px rgba(74,101,128,.10);
  }
  body {
    font-family:'Noto Sans SC','PingFang SC','PingFangSC-light','Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue','Microsoft YaHei',sans-serif;
    background: var(--xyb-bg);
    color: var(--xyb-text);
    padding:0;
    letter-spacing:.8px;
    line-height:1.75;
  }
  body:before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 8% 6%, rgba(122,155,181,.16), transparent 28%),
      radial-gradient(circle at 92% 10%, rgba(79,155,120,.10), transparent 24%),
      linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0));
    z-index:-1;
  }
  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 34px 26px 40px;
  }
  .xyb-brand{
    background:#fff;
    text-align:center;
    border:1px solid var(--xyb-line);
    border-radius:18px;
    padding:22px 18px 18px;
    margin:0 0 14px;
    box-shadow:var(--xyb-shadow);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
  }
  .xyb-brand img{
    width:72px;height:72px;object-fit:cover;display:block;border-radius:50%;
  }
  .xyb-brand-title{
    display:block;
    text-align:center;
  }
  .xyb-brand-title .name{
    font-size:18px;font-weight:700;color:var(--xyb-blue);letter-spacing:2px;line-height:1.4;
  }
  .xyb-brand-title .tagline{
    font-size:12px;color:var(--xyb-muted);letter-spacing:2px;margin-top:2px;
  }
  .header {
    margin:12px 0 18px;
    background:linear-gradient(135deg,var(--xyb-blue),var(--xyb-blue-2));
    border-radius:18px;
    padding:24px 26px;
    color:#fff;
    box-shadow:var(--xyb-shadow);
  }
  .header-top {
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    margin-bottom:10px;
  }
  .header h1 {
    font-size:24px;
    font-weight:700;
    letter-spacing:1.6px;
    color:#fff;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .header h1 .dot {
    width:10px;height:10px;border-radius:50%;
    background:#d7f0e4;
    display:inline-block;
    box-shadow:0 0 0 7px rgba(255,255,255,.18);
    animation:blink 2.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.45} }
  .header-meta {
    font-size:13px;
    color:rgba(255,255,255,.86);
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  .header-rule {
    height:1px;
    background:linear-gradient(to right, rgba(255,255,255,.58), rgba(255,255,255,.04));
  }
  .stats-bar {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin:16px 0 22px;
    padding:0;
  }
  .stat-item {
    background:rgba(255,255,255,.88);
    border:1px solid var(--xyb-line);
    border-radius:14px;
    padding:14px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
    box-shadow:0 2px 10px rgba(74,101,128,.05);
  }
  .stat-num {
    font-size:26px;
    font-weight:700;
    color:var(--xyb-blue);
    font-variant-numeric:tabular-nums;
    line-height:1;
  }
  .stat-label { font-size:13px;color:var(--xyb-muted); }
  .stat-divider { display:none; }
  .account-card {
    margin-bottom:22px;
    background:var(--xyb-card);
    border-radius:18px;
    border:1px solid var(--xyb-line);
    overflow:hidden;
    box-shadow:var(--xyb-shadow);
  }
  .account-head {
    display:flex;
    align-items:center;
    gap:14px;
    padding:18px 22px;
    background:linear-gradient(90deg, rgba(232,240,245,.95), rgba(255,255,255,.92));
    border-bottom:1px dashed var(--xyb-line);
  }
  .avatar {
    width:48px;
    height:48px;
    border-radius:14px;
    object-fit:cover;
    background:#f3f6f8;
    flex-shrink:0;
    border:2px solid #fff;
    box-shadow:0 4px 12px rgba(74,101,128,.12);
  }
  .account-name-wrap { flex:1;min-width:0; }
  .account-name {
    font-size:16px;
    font-weight:700;
    color:var(--xyb-blue);
    line-height:1.35;
  }
  .account-alias { font-size:12px;color:var(--xyb-muted);margin-top:2px; }
  .account-sig {
    font-size:12px;
    color:#6f7f8c;
    max-width:300px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-align:right;
    line-height:1.5;
  }
  .update-badge {
    padding:3px 10px;
    border-radius:99px;
    font-size:11px;
    font-weight:600;
    letter-spacing:.5px;
    flex-shrink:0;
  }
  .badge-new { background:var(--xyb-blue);color:#fff; }
  .articles {
    display:grid;
    grid-template-columns:1.35fr 1fr 1fr;
    gap:0;
    border-top:none;
  }
  .article-item {
    display:block;
    color:inherit;
    text-decoration:none;
    padding:18px 18px 20px;
    border-right:1px solid var(--xyb-soft);
    transition:background .18s ease, transform .18s ease, box-shadow .18s ease;
    position:relative;
  }
  .article-item:last-child { border-right:none; }
  .article-item:hover {
    background:#f8fbfd;
    transform:translateY(-2px);
  }
  .article-cover-wrap {
    width:100%;
    aspect-ratio:16/10;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:12px;
    background:#eef4f8;
    border:1px solid #edf3f7;
  }
  .article-cover-wrap img { width:100%;height:100%;object-fit:cover;display:block; }
  .article-cover-placeholder {
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    background:#eef4f8;color:#b4c2cc;font-size:13px;
  }
  .article-title {
    font-size:14px;
    font-weight:600;
    line-height:1.65;
    color:#344456;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    min-height:46px;
  }
  .article-bottom {
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:12px;
  }
  .article-date { font-size:12px;color:var(--xyb-muted);font-variant-numeric:tabular-nums; }
  .article-tag {
    font-size:10px;
    font-weight:700;
    padding:3px 8px;
    border-radius:99px;
    letter-spacing:.4px;
  }
  .tag-latest { background:var(--xyb-blue);color:#fff; }
  .tag-day { background:#edf4f8;color:#6d879b;border:1px solid #d9e7ef; }
  .footer {
    margin-top:28px;
    padding:18px 6px 0;
    border-top:1px solid var(--xyb-line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:11px;
    color:var(--xyb-muted);
  }
  .footer-left { display:flex;align-items:center;gap:14px; }
  .footer-dot { width:3px;height:3px;border-radius:50%;background:#c6d4dd; }
  @media (max-width:760px){
    .page{padding:20px 14px 28px;}
    .xyb-brand{text-align:left;}
    .header-top{align-items:flex-start;flex-direction:column;}
    .stats-bar{grid-template-columns:repeat(2,1fr);}
    .account-head{align-items:flex-start;flex-wrap:wrap;}
    .account-sig{text-align:left;max-width:100%;width:100%;}
    .articles{grid-template-columns:1fr;}
    .article-item{border-right:none;border-bottom:1px solid var(--xyb-soft);}
    .article-item:last-child{border-bottom:none;}
  }
</style>
</head>
<body>
<div class="page">
<div class="xyb-brand">
<img alt="小胰宝标准Logo" src="https://picgo-1302991947.cos.ap-guangzhou.myqcloud.com/images/Pop%20Mart%20Character%20Front%20View%20(2).png"/>
<span class="xyb-brand-title"><div class="name">小胰宝 · 公众号监控</div><div class="tagline">公众号更新监控 / xyb 风格工作台</div></span>
</div>
<div class="header">
  <div class="header-top">
    <h1><span class="dot"></span> 公众号监控</h1>
    <span class="header-meta">__HEADER_META__</span>
  </div>
  <div class="header-rule"></div>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num">__MONITOR_COUNT__</span><span class="stat-label">监控账号</span></div>
    <div class="stat-item"><span class="stat-num">__TOTAL_ARTICLES__</span><span class="stat-label">最新文章</span></div>
    <div class="stat-item"><span class="stat-num">__NEW_COUNT__</span><span class="stat-label">本次更新</span></div>
    <div class="stat-item"><span class="stat-num">__REFRESH_FREQ__</span><span class="stat-label">刷新频率</span></div>
  </div>
</div>
__ACCOUNT_CARDS__
__XYB_FOOTER__
</div>
</body>
</html>
